function fDate(dt) {
  if (!dt) return "—";
  return new Date(dt).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function dureeH(dep,ret) {
  if (!ret) return null;
  const d = new Date(ret)-new Date(dep);
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000);
  return h>0?`${h}h${m>0?m+"min":""}`:`${m}min`;
}
function nowISO() { return new Date().toISOString().slice(0,16); }

function btn(v) {
  const b={padding:"9px 18px",borderRadius:8,fontSize:13.5,fontWeight:600,cursor:"pointer",border:"none",display:"inline-flex",alignItems:"center",gap:7,whiteSpace:"nowrap"};
  if(v==="primary") return {...b,background:navy,color:white};
  if(v==="danger")  return {...b,background:red,color:white};
  if(v==="success") return {...b,background:green,color:white,fontSize:12,padding:"7px 14px"};
  if(v==="ghost")   return {...b,background:"transparent",color:navy,border:"1.5px solid #D0D5E8"};
  if(v==="logout")  return {...b,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.6)",fontSize:12,padding:"7px 12px",width:"100%",justifyContent:"center"};
  if(v==="notif")   return {...b,background:"#FFF7ED",color:"#C2410C",border:"1px solid #FED7AA",fontSize:12,padding:"6px 12px"};
  return b;
}

function LoginScreen({onLogin,onAbo}) {
  const [email,setEmail]=useState("");
  const [mdp,setMdp]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  function go() {
    if(!email||!mdp){setErr("Remplissez tous les champs.");return;}
    setLoading(true);
    setTimeout(()=>{
      const c=COMPTES.find(c=>c.email.toLowerCase()===email.toLowerCase()&&c.motDePasse===mdp);
      if(c){setErr("");onLogin(c);}else setErr("Email ou mot de passe incorrect.");
      setLoading(false);
    },600);
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",background:`linear-gradient(135deg,${navy} 0%,#1a3a6b 100%)`}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"50px 60px"}}>

          </div>
        ))}

        {err&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"9px 13px",color:"#DC2626",fontSize:12.5,marginBottom:14}}>⚠️ {err}</div>}

        <div style={fg}><label style={label}>Mot de passe</label><input style={input} type="password" value={mdp} onChange={e=>setMdp(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&go()} /></div>
        <button style={{...btn("primary"),width:"100%",justifyContent:"center",padding:"11px",fontSize:14}} onClick={go} disabled={loading}>{loading?"Connexion…":"Se connecter →"}</button>
        <div style={{marginTop:22,background:gray100,borderRadius:9,padding:"13px 14px"}}>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18,marginBottom:32}}>
          {plans.map(p=>(
            <div key={p.id} style={{background:p.highlight?navy:white,borderRadius:14,padding:"26px 26px 30px",boxShadow:p.highlight?"0 4px 24px rgba(15,31,61,0.25)":"0 1px 6px rgba(15,31,61,0.08)",border:p.highlight?"none":`1.5px solid ${gray200}`,color:p.highlight?white:gray900,position:"relative"}}>

              {p.features.map(f=><div key={f} style={{display:"flex",gap:8,fontSize:13,color:p.highlight?"rgba(255,255,255,0.85)":gray700,marginBottom:8}}><span style={{color:p.highlight?"#6EE7B7":green,flexShrink:0}}>✓</span><span>{f}</span></div>)}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={fg}><label style={label}>Nom *</label><input style={input} value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} placeholder="Prénom Nom" /></div>
              <div style={fg}><label style={label}>Email *</label><input style={input} type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@foyer.fr" /></div>

            <div style={fg}><label style={label}>Établissement *</label><input style={input} value={form.foyer} onChange={e=>setForm({...form,foyer:e.target.value})} placeholder="Foyer / MECS…" /></div>
            <div style={{background:"#F0FDF4",borderRadius:8,padding:"9px 13px",fontSize:12.5,color:"#059669",marginBottom:8}}>✅ Identifiants envoyés sous 24h. Aucune CB requise.</div>

function App() {
  const [appPage,setAppPage]=useState("login");
  const [session,setSession]=useState(null);
  const [data,setData]=useState({});
  const [page,setPage]=useState("dashboard");
  const [selJeune,setSelJeune]=useState(null);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [notifF,setNotifF]=useState(null);
  const [toast,setToast]=useState(null);

  function showToast(msg,color=green){setToast({msg,color});setTimeout(()=>setToast(null),3000);}

  function login(c){
    setSession(c);
    setData(p=>({...p,[c.id]:{jeunes:c.jeunes,fugues:c.fugues}}));
    setPage("dashboard");setAppPage("app");
  }

  if(appPage==="abo") return <PageAbo onRetour={()=>setAppPage("login")} />;
  if(appPage==="login") return <LoginScreen onLogin={login} onAbo={()=>setAppPage("abo")} />;

  const fid=session.id;
  const jeunes=data[fid]?.jeunes||[];
  const fugues=data[fid]?.fugues||[];
  const contacts=session.contacts;

  function setFugues(fn){setData(p=>({...p,[fid]:{...p[fid],fugues:typeof fn==="function"?fn(p[fid].fugues):fn}}));}
  function setJeunes(fn){setData(p=>({...p,[fid]:{...p[fid],jeunes:typeof fn==="function"?fn(p[fid].jeunes):fn}}));}

  const fuguesEC=fugues.filter(f=>f.statut==="en_cours");
  function getJ(id){return jeunes.find(j=>j.id===id);}
  function getFJ(id){return fugues.filter(f=>f.jeuneId===id).sort((a,b)=>new Date(b.dateDepart)-new Date(a.dateDepart));}

  function closeM(){setModal(null);setForm({});}

  const navItems=[
    {key:"dashboard",label:"Tableau de bord",icon:"📊",badge:fuguesEC.length||null},
    {key:"signaler",label:"Signaler une fugue",icon:"🚨"},
    {key:"jeunes",label:"Suivi par jeune",icon:"👥"},
    {key:"stats",label:"Statistiques",icon:"📈"},
    {key:"notifs",label:"Notifications",icon:"📣"},
  ];

  // DASHBOARD
  function Dashboard() {
    return (
      <div>
        {fuguesEC.map(f=>{
          const j=getJ(f.jeuneId);
          const h=Math.floor((Date.now()-new Date(f.dateDepart))/3600000);
          return (
            <div key={f.id} style={{background:"#FFF3CD",border:"1px solid #FFC107",borderRadius:10,padding:"11px 16px",marginBottom:13,display:"flex",alignItems:"center",gap:11,fontSize:13}}>
              <span style={{fontSize:17}}>🚨</span>
              <div style={{flex:1}}><strong>{j?.prenom} {j?.nom}</strong> — en fugue depuis <strong>{h}h</strong></div>
              <button onClick={()=>setNotifF(f)} style={btn("notif")}>📣</button>
              <button onClick={()=>{setModal({type:"retour",fid:f.id});setForm({dateRetour:nowISO(),notes:f.notes});}} style={btn("success")}>✓ Retour</button>
            </div>
          );
        })}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
          {[[red,fuguesEC.length,"En cours"],[amber,fugues.length,"Fugues totales"],[green,fugues.filter(f=>f.statut==="cloturee"&&f.dateRetour&&(new Date(f.dateRetour)-new Date(f.dateDepart))<86400000).length,"Retours < 24h"],[blue,jeunes.filter(j=>!fugues.map(f=>f.jeuneId).includes(j.id)).length,"Sans fugue"]].map(([c,v,l])=>(
            <div key={l} style={{background:white,borderRadius:12,padding:"18px 20px",boxShadow:"0 1px 4px rgba(15,31,61,0.07)",borderLeft:`4px solid ${c}`}}>
              <div style={{fontSize:30,fontWeight:800,color:c,lineHeight:1,marginBottom:4}}>{v}</div>
              <div style={{fontSize:11.5,color:gray600}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{margin:0,fontSize:14,fontWeight:700,color:navy}}>Dernières fugues</h3>
            <button onClick={()=>setPage("signaler")} style={btn("primary")}>+ Signaler</button>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Jeune","Départ","Durée","Statut",""].map(h=><th key={h} style={{textAlign:"left",padding:"9px 13px",fontSize:11,fontWeight:700,color:gray600,textTransform:"uppercase",borderBottom:`2px solid ${gray100}`}}>{h}</th>)}</tr></thead>
            <tbody>
              {[...fugues].sort((a,b)=>new Date(b.dateDepart)-new Date(a.dateDepart)).slice(0,6).map(f=>{
                const j=getJ(f.jeuneId);
                return (
                  <tr key={f.id}>
                    <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}><strong>{j?.prenom} {j?.nom}</strong></td>
                    <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}>{fDate(f.dateDepart)}</td>
                    <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}>{dureeH(f.dateDepart,f.dateRetour)||<span style={{color:red,fontWeight:600}}>En cours</span>}</td>
                    <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}><span style={sbadge(f.statut)}>{f.statut==="en_cours"?"En cours":"Clôturée"}</span></td>
                    <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}>

  // SIGNALER
  function Signaler() {

    function submit(){

      const j=getJ(parseInt(lf.jeuneId));

      setFugues(p=>[...p,nf]);setDone(true);
      showToast(`🚨 Fugue de ${j?.prenom} ${j?.nom} enregistrée`,red);
      setTimeout(()=>setNotifF(nf),700);
    }
    if(done) return (
      <div style={{...card,maxWidth:480,margin:"0 auto",textAlign:"center",padding:"44px 36px"}}>

                <span style={{fontSize:12.5,fontWeight:step===parseInt(n)?700:400,color:step>=parseInt(n)?navy:gray400}}>{l}</span>

            <>
              <h3 style={{margin:"0 0 18px",fontSize:15,fontWeight:700,color:navy}}>Étape 1 — Jeune & départ</h3>
              <div style={fg}><label style={label}>Jeune *</label>
                <select style={select} value={lf.jeuneId} onChange={e=>setLf({...lf,jeuneId:e.target.value})}>

              </div>
              {jS&&<div style={{background:"#EFF6FF",borderRadius:8,padding:"9px 13px",marginBottom:14,fontSize:12.5,color:"#1D4ED8"}}>👤 <strong>{jS.prenom} {jS.nom}</strong> · {jS.age} ans · Chambre {jS.chambre}</div>}
              <div style={fg}><label style={label}>Date et heure *</label><input style={input} type="datetime-local" value={lf.dateDepart} onChange={e=>setLf({...lf,dateDepart:e.target.value})} /></div>
              <div style={{display:"flex",justifyContent:"flex-end"}}><button style={btn("primary")} onClick={()=>lf.jeuneId&&setStep(2)}>Suivant →</button></div>
            </>

          {step===2&&(
            <>
              <h3 style={{margin:"0 0 18px",fontSize:15,fontWeight:700,color:navy}}>Étape 2 — Contexte</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

                <div style={fg}><label style={label}>Lieu</label><select style={select} value={lf.lieu} onChange={e=>setLf({...lf,lieu:e.target.value})}>{LIEUX.map(l=><option key={l}>{l}</option>)}</select></div>

            <>
              <h3 style={{margin:"0 0 6px",fontSize:15,fontWeight:700,color:navy}}>Étape 3 — Notifications</h3>
              <p style={{fontSize:12.5,color:gray600,marginBottom:18}}>Contacts alertés par <strong>SMS + Email</strong> automatiquement.</p>
              {[{k:"notifASE",l:"ASE",i:"🏛",info:contacts.ase},{k:"notifParents",l:"Parents",i:"👨‍👩‍👦",info:jS?{nom:`Famille ${jS.nom}`,email:jS.parentEmail,tel:jS.parentTel}:{}},{k:"notifAstreinte",l:"Astreinte",i:"🌙",info:contacts.astreinte},{k:"notifPolice",l:"Police",i:"🚔",info:contacts.police}].map(({k,l,i,info})=>(
                <div key={k} style={{background:lf[k]?"#EFF6FF":bg,border:`1.5px solid ${lf[k]?"#93C5FD":gray200}`,borderRadius:9,padding:"13px 14px",marginBottom:9,cursor:"pointer"}} onClick={()=>setLf({...lf,[k]:!lf[k]})}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <input type="checkbox" checked={!!lf[k]} onChange={()=>{}} />
                    <span style={{fontSize:18}}>{i}</span>
                    <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13.5,color:navy}}>{l}</div><div style={{fontSize:11.5,color:gray600}}>{info.nom} · {info.tel}</div></div>
                  </div>

              ))}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>
                <button style={btn("ghost")} onClick={()=>setStep(2)}>← Retour</button>
                <button style={btn("danger")} onClick={submit}>🚨 Enregistrer & alerter</button>

    );

  // STATS
  function Stats() {
    const mL=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    const pM=Array(12).fill(0);fugues.forEach(f=>pM[new Date(f.dateDepart).getMonth()]++);
    const mx=Math.max(...pM,1);
    const dur=fugues.filter(f=>f.dateRetour).map(f=>(new Date(f.dateRetour)-new Date(f.dateDepart))/3600000);
    const moy=dur.length?(dur.reduce((a,b)=>a+b,0)/dur.length).toFixed(1):0;
    return (
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
          {[[navy,fugues.length,"Total"],[amber,`${moy}h`,"Durée moy."],[red,fugues.filter(f=>f.signalementPolicier).length,"Signalements"]].map(([c,v,l])=>(
            <div key={l} style={{background:white,borderRadius:12,padding:"18px 20px",boxShadow:"0 1px 4px rgba(15,31,61,0.07)",borderLeft:`4px solid ${c}`}}>
              <div style={{fontSize:30,fontWeight:800,color:c,lineHeight:1,marginBottom:4}}>{v}</div>
              <div style={{fontSize:11.5,color:gray600}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{...card,marginBottom:20}}>
          <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:700}}>Fugues par mois</h3>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:90}}>
            {pM.map((n,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:"100%",background:n>0?navy:gray200,borderRadius:"3px 3px 0 0",height:`${(n/mx)*75}px`,minHeight:n>0?5:2}} />
                <span style={{fontSize:8.5,color:gray400}}>{mL[i]}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={card}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:700}}>Par jeune</h3>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Jeune","Fugues","Durée moy.","Signalements"].map(h=><th key={h} style={{textAlign:"left",padding:"9px 13px",fontSize:11,fontWeight:700,color:gray600,textTransform:"uppercase",borderBottom:`2px solid ${gray100}`}}>{h}</th>)}</tr></thead>
            <tbody>{jeunes.map(j=>{
              const fj=getFJ(j.id);
              const d=fj.filter(f=>f.dateRetour).map(f=>(new Date(f.dateRetour)-new Date(f.dateDepart))/3600000);
              const mo=d.length?(d.reduce((a,b)=>a+b,0)/d.length).toFixed(1):"—";
              return(<tr key={j.id}>
                <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}><strong>{j.prenom} {j.nom}</strong></td>
                <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}><span style={{fontWeight:700,color:fj.length>2?red:gray900}}>{fj.length}</span></td>
                <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}>{mo!=="—"?`${mo}h`:"—"}</td>
                <td style={{padding:"11px 13px",fontSize:13,borderBottom:`1px solid ${gray100}`}}>{fj.filter(f=>f.signalementPolicier).length}</td>
              </tr>);
            })}</tbody>
          </table>
        </div>
      </div>
    );
  }

  // NOTIF PANEL
  function NotifPanel({fugue,jeune,onClose}) {
    const [sent,setSent]=useState(fugue.notifications||[]);
    const [sending,setSending]=useState(false);
    const dests=[
      {k:"ase",l:"ASE",i:"🏛",info:contacts.ase},
      {k:"parents",l:"Parents",i:"👨‍👩‍👦",info:{nom:`Famille ${jeune?.nom}`,email:jeune?.parentEmail,tel:jeune?.parentTel}},
      {k:"astreinte",l:"Astreinte",i:"🌙",info:contacts.astreinte},
      {k:"police",l:"Police",i:"🚔",info:contacts.police},
    ];
    function sendAll(){
      setSending(true);
      setTimeout(()=>{
        const h=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
        setSent(dests.flatMap(d=>[{dest:d.l,type:"SMS",heure:h,statut:"envoyé"},{dest:d.l,type:"Email",heure:h,statut:"envoyé"}]));
        setSending(false);
      },1400);
    }
    function sendOne(dest,type){
      setSending(true);
      setTimeout(()=>{
        const h=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
        setSent(p=>[...p,{dest,type,heure:h,statut:"envoyé"}]);
        setSending(false);
      },800);
    }
    const isSent=(dest,type)=>sent.some(n=>n.dest===dest&&n.type===type);
    return (
      <div style={overlay} onClick={onClose}>
        <div style={{...mbox,maxWidth:540}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
            <h2 style={{fontSize:17,fontWeight:700,color:navy}}>📣 Notifications — {jeune?.prenom} {jeune?.nom}</h2>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:gray400}}>✕</button>
          </div>
          <p style={{fontSize:12.5,color:gray600,marginBottom:16}}>Départ {fDate(fugue.dateDepart)} · {fugue.lieu}</p>
          {sent.length===0
            ?<div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:9,padding:"11px 14px",marginBottom:14,fontSize:13,color:"#C2410C"}}>⚠️ Aucune notification envoyée.</div>
            :<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:9,padding:"9px 13px",marginBottom:14,fontSize:12.5,color:"#059669",fontWeight:600}}>✅ {sent.length} notification{sent.length>1?"s":""} envoyée{sent.length>1?"s":""}</div>
          }
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
            <button style={btn("danger")} onClick={sendAll} disabled={sending}>{sending?"Envoi…":"📣 Alerter tous (SMS + Email)"}</button>
          </div>
          {dests.map(d=>(
            <div key={d.k} style={{background:bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${gray200}`,marginBottom:9}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <span style={{fontSize:18}}>{d.i}</span>
                  <div><div style={{fontWeight:700,fontSize:13.5}}>{d.l}</div><div style={{fontSize:11.5,color:gray600}}>{d.info?.nom}</div></div>
                </div>
                <div style={{display:"flex",gap:5}}>
                  {["SMS","Email"].map(type=>isSent(d.l,type)
                    ?<span key={type} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,padding:"2px 7px",borderRadius:10,background:"#D1FAE5",color:"#059669",marginRight:4}}>✓ {type}</span>
                    :<button key={type} style={btn("notif")} onClick={()=>sendOne(d.l,type)} disabled={sending}>{type==="SMS"?"📱":"✉️"} {type}</button>
                  )}
                </div>
              </div>
              <div style={{fontSize:11.5,color:gray600}}>📱 {d.info?.tel} · ✉️ {d.info?.email}</div>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
            <button style={btn("ghost")} onClick={onClose}>Fermer</button>
          </div>
        </div>
      </div>
    );
  }

          <div style={{color:"rgba(255,255,255,0.28)",fontSize:9.5,fontWeight:700,letterSpacing:1.2,padding:"0 8px",marginBottom:4,marginTop:12,textTransform:"uppercase"}}>Menu</div>
          {navItems.map(item=>(
            <button key={item.key} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:8,cursor:"pointer",color:page===item.key||(page==="profil"&&item.key==="jeunes")?white:"rgba(255,255,255,0.55)",background:page===item.key||(page==="profil"&&item.key==="jeunes")?"rgba(255,255,255,0.1)":"transparent",fontSize:13,fontWeight:page===item.key?600:400,marginBottom:2,border:"none",width:"100%",textAlign:"left"}} onClick={()=>setPage(item.key)}>
              <span>{item.icon}</span><span style={{flex:1}}>{item.label}</span>
              {item.badge&&<span style={{background:red,color:white,borderRadius:10,fontSize:10.5,fontWeight:700,padding:"1px 6px"}}>{item.badge}</span>}
            </button>
          ))}
          <div style={{color:"rgba(255,255,255,0.28)",fontSize:9.5,fontWeight:700,letterSpacing:1.2,padding:"0 8px",marginBottom:4,marginTop:12,textTransform:"uppercase"}}>Compte</div>
          <button style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",borderRadius:8,cursor:"pointer",color:"rgba(255,255,255,0.55)",background:"transparent",fontSize:13,fontWeight:400,marginBottom:2,border:"none",width:"100%",textAlign:"left"}} onClick={()=>setAppPage("abo")}>
            <span>💳</span><span>Abonnement</span>
          </button>
        </nav>
        <div style={{padding:"13px 11px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          <button style={btn("logout")} onClick={()=>{setSession(null);setAppPage("login");}}>⬅ Déconnexion</button>
        </div>
      </div>

      {/* Main */}
      <main style={{marginLeft:220,padding:"24px 28px",minHeight:"100vh"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
          <h1 style={{fontSize:20,fontWeight:700,color:navy,margin:0}}>{titles[page]}</h1>
          {page==="jeunes"&&<button onClick={()=>{setModal({type:"jeune"});setForm({dateEntree:nowISO().slice(0,10)});}} style={btn("primary")}>+ Ajouter</button>}
        </div>
        {page==="dashboard"&&<Dashboard />}
        {page==="signaler"&&<Signaler />}
        {page==="jeunes"&&<Jeunes />}
        {page==="profil"&&<Profil />}
        {page==="stats"&&<Stats />}
        {page==="notifs"&&<Notifs />}
      </main>

      {/* Modals */}
      {modal&&(
        <div style={overlay} onClick={closeM}>
          <div style={mbox} onClick={e=>e.stopPropagation()}>
            {modal.type==="retour"&&(()=>{
              const f=fugues.find(f=>f.id===modal.fid);const j=getJ(f?.jeuneId);
              return(<>
                <h2 style={{fontSize:17,fontWeight:700,marginBottom:18,color:navy}}>✅ Enregistrer le retour</h2>
                <p style={{color:gray600,fontSize:13,marginBottom:18}}>{j?.prenom} {j?.nom} — parti le {fDate(f?.dateDepart)}</p>
                <div style={fg}><label style={label}>Date et heure *</label><input style={input} type="datetime-local" value={form.dateRetour} onChange={e=>setForm({...form,dateRetour:e.target.value})} /></div>
                <div style={fg}><label style={label}>Notes</label><textarea style={{...input,resize:"vertical",minHeight:65}} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} /></div>
                <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
                  <button style={btn("ghost")} onClick={closeM}>Annuler</button>
                  <button style={btn("success")} onClick={()=>{setFugues(p=>p.map(f=>f.id===modal.fid?{...f,dateRetour:form.dateRetour,statut:"cloturee",notes:form.notes}:f));closeM();showToast("Retour enregistré");}}>Confirmer</button>
                </div>
              </>);
            })()}
            {modal.type==="jeune"&&(<>
              <h2 style={{fontSize:17,fontWeight:700,marginBottom:18,color:navy}}>👤 Ajouter un jeune</h2>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div style={fg}><label style={label}>Prénom *</label><input style={input} value={form.prenom||""} onChange={e=>setForm({...form,prenom:e.target.value})} /></div>
                <div style={fg}><label style={label}>Nom *</label><input style={input} value={form.nom||""} onChange={e=>setForm({...form,nom:e.target.value})} /></div>
                <div style={fg}><label style={label}>Âge</label><input style={input} type="number" value={form.age||""} onChange={e=>setForm({...form,age:e.target.value})} /></div>
                <div style={fg}><label style={label}>Chambre</label><input style={input} value={form.chambre||""} onChange={e=>setForm({...form,chambre:e.target.value})} /></div>
                <div style={fg}><label style={label}>Email parents</label><input style={input} type="email" value={form.parentEmail||""} onChange={e=>setForm({...form,parentEmail:e.target.value})} /></div>
                <div style={fg}><label style={label}>Tél. parents</label><input style={input} value={form.parentTel||""} onChange={e=>setForm({...form,parentTel:e.target.value})} /></div>
              </div>
              <div style={fg}><label style={label}>Date d'entrée</label><input style={input} type="date" value={form.dateEntree||""} onChange={e=>setForm({...form,dateEntree:e.target.value})} /></div>
              <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
                <button style={btn("ghost")} onClick={closeM}>Annuler</button>
                <button style={btn("primary")} onClick={()=>{if(!form.nom||!form.prenom)return;setJeunes(p=>[...p,{id:Date.now(),nom:form.nom,prenom:form.prenom,age:parseInt(form.age)||0,chambre:form.chambre||"",dateEntree:form.dateEntree||nowISO().slice(0,10),parentEmail:form.parentEmail||"",parentTel:form.parentTel||""}]);closeM();showToast(`${form.prenom} ${form.nom} ajouté`);}}>Ajouter</button>
              </div>
            </>)}
          </div>
        </div>
      )}

      {notifF&&<NotifPanel fugue={notifF} jeune={getJ(notifF.jeuneId)} onClose={()=>setNotifF(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
